<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanMyShadow — Sample Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.15);
  --gold-border: rgba(212,175,55,0.3);
  --gold-glow: rgba(212,175,55,0.12);
  --red: #e05c5c;
  --green: #3ecf8e;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --muted: rgba(255,255,255,0.45);
  --text: #fff;
  --radius: 12px;
}
body {
  background: transparent;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  padding: 0 0 48px 0;
  min-width: 320px;
}
.hero {
  position: relative;
  text-align: center;
  padding: 64px 24px 52px;
  max-width: 600px;
  margin: 0 auto;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  height: 200px;
  background: radial-gradient(ellipse, rgba(212,175,55,0.13) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.hero-rule {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 0 auto 22px;
  position: relative;
  z-index: 1;
}
.hero-label {
  position: relative;
  z-index: 1;
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  background: linear-gradient(90deg, #b8922a, #f0d060, #d4af37, #f0d060, #b8922a);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 300% center; }
}
.hero-heading {
  position: relative;
  z-index: 1;
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4.5vw, 29px);
  font-weight: 900;
  line-height: 1.18;
  color: #fff;
  margin-bottom: 0;
  letter-spacing: -0.02em;
}
.hero-divider {
  position: relative;
  z-index: 1;
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 24px auto 20px;
}
.hero-sub {
  position: relative;
  z-index: 1;
  font-size: 14px;
  color: rgba(255,255,255,0.38);
  font-style: italic;
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-rule"></div>
  <div class="hero-label">Sample Report</div>
  <h2 class="hero-heading">This Is What Strangers<br>Can Already See About You</h2>
  <div class="hero-divider"></div>
  <p class="hero-sub">These are sample reports showing the kind of insights you’ll receive based on the data you share with us. Your actual results will reflect your unique digital footprint.</p>
</div>

<div class="tab-wrap">
  <div class="l1-tabs">
    <button class="tab-btn active" onclick="switchL1(this,'panel-clean')">If Nothing Found</button>
    <button class="tab-btn" onclick="switchL1(this,'panel-hits')">If Something Found</button>
  </div>
</div>

</body>
</html>
